<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'webapp/index.css' %}">
</head>
<body>



    <h1>Homepage</h1>

    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        <strong>Message:</strong> {{ message }}
        <button type="button" class="close" data-dismiss="alert" aria-label="Close">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    {% endfor %}

    
    {% if user.is_authenticated %}
    <h3> Welcome  {{ user.first_name }}</h3>
    <p>You have succefully login</p>
    <button type="button"> <a href='/singout'>Sing Out</a> </button>
    {% else %}

    <button type="button" class="btn"> <a href='/singup'>Sing Up</a> </button> 
    <button type="button" class="btn"> <a href='/singin'>Sing In</a> </button>
   
    {% endif %}
    
</body>
</html>
